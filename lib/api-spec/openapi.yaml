openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Smart Farming API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: crops
    description: Crop scan and analysis operations
  - name: soil
    description: Soil data operations
  - name: climate
    description: Climate data operations
  - name: recommendations
    description: Farming recommendation and chatbot operations
  - name: dashboard
    description: Dashboard summary and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /crops:
    get:
      operationId: listCropScans
      tags: [crops]
      summary: List all crop scans for the current user
      parameters:
        - in: query
          name: cropType
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: List of crop scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CropScan"
    post:
      operationId: createCropScan
      tags: [crops]
      summary: Create a new crop scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCropScanBody"
      responses:
        "201":
          description: Created crop scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropScan"

  /crops/detect-image:
    post:
      operationId: detectCropFromImage
      tags: [crops]
      summary: Detect crop type from an uploaded image using AI vision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectCropImageBody"
      responses:
        "200":
          description: Detected crop type and confidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropDetectionResult"

  /crops/{id}:
    get:
      operationId: getCropScan
      tags: [crops]
      summary: Get a specific crop scan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crop scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropScan"
        "404":
          description: Not found
    delete:
      operationId: deleteCropScan
      tags: [crops]
      summary: Delete a crop scan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /crops/{id}/analyze:
    post:
      operationId: analyzeCropScan
      tags: [crops]
      summary: Run AI analysis on crop scan (identification, health, yield, harvest prediction)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropAnalysis"

  /soil:
    get:
      operationId: listSoilRecords
      tags: [soil]
      summary: List soil data records
      parameters:
        - in: query
          name: cropScanId
          schema:
            type: integer
      responses:
        "200":
          description: List of soil records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SoilData"
    post:
      operationId: createSoilData
      tags: [soil]
      summary: Add soil data for a crop scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSoilDataBody"
      responses:
        "201":
          description: Created soil record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoilData"

  /climate:
    get:
      operationId: listClimateRecords
      tags: [climate]
      summary: List climate data records
      parameters:
        - in: query
          name: cropScanId
          schema:
            type: integer
      responses:
        "200":
          description: List of climate records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClimateData"
    post:
      operationId: createClimateData
      tags: [climate]
      summary: Add climate data for a crop scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClimateDataBody"
      responses:
        "201":
          description: Created climate record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClimateData"

  /recommendations:
    get:
      operationId: listRecommendations
      tags: [recommendations]
      summary: List recommendations
      parameters:
        - in: query
          name: cropScanId
          schema:
            type: integer
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [recommendations]
      summary: Send a message to the farming AI chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: Chatbot response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [recommendations]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [recommendations]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [recommendations]
      summary: Delete a conversation and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Conversation deleted

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [recommendations]
      summary: Get all messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationMessage"
    post:
      operationId: sendConversationMessage
      tags: [recommendations]
      summary: Send a message in an existing conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendConversationMessageBody"
      responses:
        "200":
          description: AI reply and suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /farms:
    get:
      operationId: listFarms
      tags: [farms]
      summary: List all farms
      responses:
        "200":
          description: List of farms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"
    post:
      operationId: createFarm
      tags: [farms]
      summary: Create a new farm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFarmBody"
      responses:
        "201":
          description: Created farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/{id}:
    get:
      operationId: getFarm
      tags: [farms]
      summary: Get a farm by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farm details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
    put:
      operationId: updateFarm
      tags: [farms]
      summary: Update a farm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFarmBody"
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
    delete:
      operationId: deleteFarm
      tags: [farms]
      summary: Delete a farm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /farms/{id}/dashboard:
    get:
      operationId: getFarmDashboard
      tags: [farms]
      summary: Get AI-powered dashboard data for a farm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farm dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmDashboard"

  /farms/{id}/analytics:
    get:
      operationId: getFarmAnalytics
      tags: [farms]
      summary: Get AI analytics for a farm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farm analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmAnalytics"

  /farms/{id}/yield-optimization:
    post:
      operationId: optimizeFarmYield
      tags: [farms]
      summary: Calculate optimal yield for given land area and crops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YieldOptimizationBody"
      responses:
        "200":
          description: Yield optimization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YieldOptimizationResult"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard stats and summaries
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent:
    get:
      operationId: getRecentScans
      tags: [dashboard]
      summary: Get the most recent crop scans with analysis
      responses:
        "200":
          description: Recent scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CropScan"

  /dashboard/crop-stats:
    get:
      operationId: getCropStats
      tags: [dashboard]
      summary: Get stats broken down by crop type
      responses:
        "200":
          description: Crop stats by type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CropStatItem"

components:
  schemas:
    DetectCropImageBody:
      type: object
      required: [imageUrl]
      properties:
        imageUrl:
          type: string

    CropDetectionResult:
      type: object
      required: [cropType, confidence, message]
      properties:
        cropType:
          type: ["string", "null"]
        confidence:
          type: number
        message:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CropScan:
      type: object
      properties:
        id:
          type: integer
        cropType:
          type: ["string", "null"]
        growthStage:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        healthStatus:
          type: ["string", "null"]
        diseaseDetected:
          type: ["string", "null"]
        nutrientDeficiency:
          type: ["string", "null"]
        yieldPredictionKg:
          type: ["number", "null"]
        harvestDaysRemaining:
          type: ["integer", "null"]
        harvestWindow:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        analysisNotes:
          type: ["string", "null"]
        analyzed:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - analyzed
        - createdAt
        - updatedAt

    CreateCropScanBody:
      type: object
      properties:
        cropType:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
      required: []

    CropAnalysis:
      type: object
      properties:
        cropType:
          type: string
        growthStage:
          type: string
        healthStatus:
          type: string
        diseaseDetected:
          type: ["string", "null"]
        nutrientDeficiency:
          type: ["string", "null"]
        yieldPredictionKg:
          type: number
        harvestDaysRemaining:
          type: integer
        harvestWindow:
          type: string
        confidence:
          type: number
        analysisNotes:
          type: string
        recommendations:
          type: array
          items:
            type: string
      required:
        - cropType
        - growthStage
        - healthStatus
        - yieldPredictionKg
        - harvestDaysRemaining
        - harvestWindow
        - confidence
        - analysisNotes
        - recommendations

    SoilData:
      type: object
      properties:
        id:
          type: integer
        cropScanId:
          type: integer
        phLevel:
          type: ["number", "null"]
        moisturePercent:
          type: ["number", "null"]
        nitrogenPpm:
          type: ["number", "null"]
        phosphorusPpm:
          type: ["number", "null"]
        potassiumPpm:
          type: ["number", "null"]
        organicMatterPercent:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - cropScanId
        - createdAt

    CreateSoilDataBody:
      type: object
      properties:
        cropScanId:
          type: integer
        phLevel:
          type: ["number", "null"]
        moisturePercent:
          type: ["number", "null"]
        nitrogenPpm:
          type: ["number", "null"]
        phosphorusPpm:
          type: ["number", "null"]
        potassiumPpm:
          type: ["number", "null"]
        organicMatterPercent:
          type: ["number", "null"]
      required:
        - cropScanId

    ClimateData:
      type: object
      properties:
        id:
          type: integer
        cropScanId:
          type: integer
        temperatureCelsius:
          type: ["number", "null"]
        humidityPercent:
          type: ["number", "null"]
        rainfallMm:
          type: ["number", "null"]
        windSpeedKmh:
          type: ["number", "null"]
        sunlightHours:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - cropScanId
        - createdAt

    CreateClimateDataBody:
      type: object
      properties:
        cropScanId:
          type: integer
        temperatureCelsius:
          type: ["number", "null"]
        humidityPercent:
          type: ["number", "null"]
        rainfallMm:
          type: ["number", "null"]
        windSpeedKmh:
          type: ["number", "null"]
        sunlightHours:
          type: ["number", "null"]
      required:
        - cropScanId

    Recommendation:
      type: object
      properties:
        id:
          type: integer
        cropScanId:
          type: integer
        type:
          type: string
        message:
          type: string
        priority:
          type: string
        createdAt:
          type: string
      required:
        - id
        - cropScanId
        - type
        - message
        - priority
        - createdAt

    ChatMessageBody:
      type: object
      properties:
        message:
          type: string
        cropScanId:
          type: ["integer", "null"]
        cropType:
          type: ["string", "null"]
      required:
        - message

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        suggestions:
          type: array
          items:
            type: string
      required:
        - reply
        - suggestions

    DashboardSummary:
      type: object
      properties:
        totalScans:
          type: integer
        analyzedScans:
          type: integer
        healthyCount:
          type: integer
        diseasedCount:
          type: integer
        avgYieldKg:
          type: number
        avgHarvestDays:
          type: integer
        cropBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CropStatItem"
      required:
        - totalScans
        - analyzedScans
        - healthyCount
        - diseasedCount
        - avgYieldKg
        - avgHarvestDays
        - cropBreakdown

    CropStatItem:
      type: object
      properties:
        cropType:
          type: string
        count:
          type: integer
        avgYieldKg:
          type: number
        avgHealthScore:
          type: number
      required:
        - cropType
        - count
        - avgYieldKg
        - avgHealthScore

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        lastMessage:
          type: ["string", "null"]
      required:
        - id
        - title
        - createdAt

    ConversationMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendConversationMessageBody:
      type: object
      properties:
        message:
          type: string
        cropType:
          type: ["string", "null"]
      required:
        - message

    Farm:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        acreage:
          type: ["string", "null"]
        crops:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - location
        - status
        - createdAt
        - updatedAt

    CreateFarmBody:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        acreage:
          type: ["string", "null"]
        crops:
          type: array
          items:
            type: string
      required:
        - name
        - location

    UpdateFarmBody:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        acreage:
          type: ["string", "null"]
        crops:
          type: array
          items:
            type: string

    FarmDashboard:
      type: object
      properties:
        farm:
          $ref: "#/components/schemas/Farm"
        healthScore:
          type: integer
        cropHealthMap:
          type: array
          items:
            type: object
            properties:
              crop:
                type: string
              health:
                type: string
              score:
                type: integer
            required:
              - crop
              - health
              - score
        weatherInsights:
          type: object
          properties:
            temperature:
              type: string
            humidity:
              type: string
            rainfall:
              type: string
            advisory:
              type: string
          required:
            - temperature
            - humidity
            - rainfall
            - advisory
        soilInsights:
          type: object
          properties:
            ph:
              type: string
            nitrogen:
              type: string
            phosphorus:
              type: string
            potassium:
              type: string
            advisory:
              type: string
          required:
            - ph
            - nitrogen
            - phosphorus
            - potassium
            - advisory
        recentAlerts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              message:
                type: string
              severity:
                type: string
            required:
              - type
              - message
              - severity
        performanceTrend:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              yield:
                type: number
              health:
                type: integer
            required:
              - month
              - yield
              - health
        aiInsights:
          type: string
      required:
        - farm
        - healthScore
        - cropHealthMap
        - weatherInsights
        - soilInsights
        - recentAlerts
        - performanceTrend
        - aiInsights

    FarmAnalytics:
      type: object
      properties:
        yieldPrediction:
          type: object
          properties:
            totalEstimatedKg:
              type: number
            bycrops:
              type: array
              items:
                type: object
                properties:
                  crop:
                    type: string
                  estimatedKg:
                    type: number
                  confidence:
                    type: string
                required:
                  - crop
                  - estimatedKg
                  - confidence
            seasonalOutlook:
              type: string
          required:
            - totalEstimatedKg
            - bycrops
            - seasonalOutlook
        riskAlerts:
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
              level:
                type: string
              description:
                type: string
              action:
                type: string
            required:
              - risk
              - level
              - description
              - action
        cropComparison:
          type: array
          items:
            type: object
            properties:
              crop:
                type: string
              profitabilityScore:
                type: integer
              marketDemand:
                type: string
              avgYieldKgPerAcre:
                type: number
              estimatedRevenuePerAcre:
                type: number
            required:
              - crop
              - profitabilityScore
              - marketDemand
              - avgYieldKgPerAcre
              - estimatedRevenuePerAcre
        trendData:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              yield:
                type: number
              rainfall:
                type: number
              healthScore:
                type: integer
            required:
              - month
              - yield
              - rainfall
              - healthScore
        aiRecommendations:
          type: string
      required:
        - yieldPrediction
        - riskAlerts
        - cropComparison
        - trendData
        - aiRecommendations

    YieldOptimizationBody:
      type: object
      properties:
        acreage:
          type: number
        selectedCrops:
          type: array
          items:
            type: string
        spacingPreference:
          type: string
      required:
        - acreage
        - selectedCrops

    YieldOptimizationResult:
      type: object
      properties:
        totalPlants:
          type: integer
        totalEstimatedYieldKg:
          type: number
        estimatedRevenueInr:
          type: number
        cropBreakdown:
          type: array
          items:
            type: object
            properties:
              crop:
                type: string
              allocatedAcres:
                type: number
              plantsPerAcre:
                type: integer
              totalPlants:
                type: integer
              yieldKgPerPlant:
                type: number
              totalYieldKg:
                type: number
              revenueInr:
                type: number
              spacing:
                type: string
            required:
              - crop
              - allocatedAcres
              - plantsPerAcre
              - totalPlants
              - yieldKgPerPlant
              - totalYieldKg
